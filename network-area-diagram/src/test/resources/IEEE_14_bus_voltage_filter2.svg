.nad-vl300to500 .nad-bus-0 {--nad-vl-color: #ef5350}
.nad-vl300to500 .nad-bus-1 {--nad-vl-color: #ef9a9a}
.nad-vl300to500 .nad-bus-2 {--nad-vl-color: #b71c1c}
.nad-vl300to500 .nad-bus-3 {--nad-vl-color: #e57373}
